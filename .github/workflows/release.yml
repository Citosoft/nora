name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target_name: Windows
            storage_name: windows
            make_command: npm run make
            source_dir: out/make
            storage_path: releases/${{ github.ref_name }}/windows.tgz
            upload_content_type: application/gzip
          - os: ubuntu-latest
            target_name: Linux Deb
            storage_name: linux-deb
            make_command: npm run make
            source_dir: out/make
            storage_path: releases/${{ github.ref_name }}/linux-deb.tgz
            upload_content_type: application/gzip
          - os: macos-latest
            target_name: macOS
            storage_name: macos
            make_command: npm run make:darwin
            source_dir: out/release-macos
            storage_path: releases/${{ github.ref_name }}/macos-arm64.dmg
            upload_content_type: application/x-apple-diskimage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Check Nora bridge usage
        run: npm run check:nora-bridge-usage

      - name: Run unit tests
        run: npm run test:unit

      - name: Make distributables
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NORA_GITHUB_CLIENT_ID: ${{ secrets.NORA_GITHUB_CLIENT_ID }}
          NORA_POSTHOG_API_KEY: ${{ secrets.NORA_POSTHOG_API_KEY }}
          NORA_POSTHOG_HOST: ${{ secrets.NORA_POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
        run: ${{ matrix.make_command }}

      - name: Build macOS DMG artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_BUNDLE_PATH="out/Nora-darwin-arm64/Nora.app"
          if [ ! -d "${APP_BUNDLE_PATH}" ]; then
            echo "Missing packaged app bundle at ${APP_BUNDLE_PATH}"
            exit 1
          fi
          mkdir -p out/release-macos
          hdiutil create \
            -volname "Nora" \
            -srcfolder "${APP_BUNDLE_PATH}" \
            -ov \
            -format UDZO \
            "out/release-macos/Nora-arm64.dmg"

      - name: Verify and checksum macOS DMG artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DMG_PATH="out/release-macos/Nora-arm64.dmg"
          CHECKSUM_PATH="out/release-macos/Nora-arm64.dmg.sha256"
          if [ ! -f "${DMG_PATH}" ]; then
            echo "Missing expected macOS DMG at ${DMG_PATH}"
            exit 1
          fi
          hdiutil verify "${DMG_PATH}"
          (
            cd out/release-macos
            shasum -a 256 Nora-arm64.dmg > Nora-arm64.dmg.sha256
          )
          if [ ! -s "${CHECKSUM_PATH}" ]; then
            echo "Failed to generate checksum file at ${CHECKSUM_PATH}"
            exit 1
          fi

      - name: Upload make artifacts to Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: ${{ matrix.storage_path }}
          SOURCE_DIR: ${{ matrix.source_dir }}
          SUPABASE_UPLOAD_CONTENT_TYPE: ${{ matrix.upload_content_type }}
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ARCHIVE_PATH="${SOURCE_DIR}/Nora-arm64.dmg"
            if [ ! -f "${ARCHIVE_PATH}" ]; then
              echo "Missing expected macOS DMG at ${ARCHIVE_PATH}"
              exit 1
            fi
            export ARCHIVE_PATH
          else
            ARCHIVE_PATH="$(mktemp "${TMPDIR:-/tmp}/${{ matrix.storage_name }}.XXXXXX.tgz")"
            export ARCHIVE_PATH
            tar -C "${SOURCE_DIR}" -czf "${ARCHIVE_PATH}" .
          fi
          node scripts/release/upload-supabase-artifact.mjs

      - name: Upload macOS DMG checksum to Supabase
        if: runner.os == 'macOS'
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/macos-arm64.dmg.sha256
          SUPABASE_UPLOAD_CONTENT_TYPE: text/plain
          ARCHIVE_PATH: out/release-macos/Nora-arm64.dmg.sha256
        run: node scripts/release/upload-supabase-artifact.mjs

  release:
    name: Create GitHub release (Windows + Linux)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Windows build artifact from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/windows.tgz
          DEST_DIR: release-assets
        run: bash scripts/release/download-supabase-artifact.sh

      - name: Download Linux build artifact from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/linux-deb.tgz
          DEST_DIR: release-assets
        run: bash scripts/release/download-supabase-artifact.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true

  publish_apt:
    name: Publish APT repository
    runs-on: ubuntu-latest
    needs:
      - build
      - release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Linux build artifact from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/linux-deb.tgz
          DEST_DIR: release-assets
        run: bash scripts/release/download-supabase-artifact.sh

      - name: Install publishing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Clone APT repository
        env:
          NORA_APT_REPO_TOKEN: ${{ secrets.NORA_APT_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${NORA_APT_REPO_TOKEN}@github.com/Citosoft/apt.git" apt-repo

      - name: Update signed APT repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
          APT_RELEASE_REPO: Citosoft/nora
          APT_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          DEB_PATH="$(find release-assets -type f -name '*.deb' | head -n 1)"
          if [ -z "${DEB_PATH}" ]; then
            echo "No .deb artifact found in release-assets"
            exit 1
          fi
          cd apt-repo
          bash scripts/update-apt-repo.sh "${GITHUB_WORKSPACE}/${DEB_PATH}"

      - name: Commit and push APT repository updates
        env:
          NORA_APT_REPO_TOKEN: ${{ secrets.NORA_APT_REPO_TOKEN }}
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No APT repository changes to commit."
            exit 0
          fi
          git commit -m "Publish ${GITHUB_REF_NAME}"
          git push "https://x-access-token:${NORA_APT_REPO_TOKEN}@github.com/Citosoft/apt.git" HEAD:main
