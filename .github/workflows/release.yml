name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            target_name: Windows
            storage_name: windows
            make_command: npm run make
            source_dir: out/make
            storage_path: releases/${{ github.ref_name }}/windows.tgz
            upload_content_type: application/gzip
          - os: ubuntu-latest
            target_name: Linux Deb
            storage_name: linux-deb
            make_command: npm run make
            source_dir: out/make
            storage_path: releases/${{ github.ref_name }}/linux-deb.tgz
            upload_content_type: application/gzip
          - os: macos-latest
            target_name: macOS
            storage_name: macos
            make_command: npm run make:darwin
            source_dir: out/make
            storage_path: releases/${{ github.ref_name }}/macos-arm64.dmg
            upload_content_type: application/x-apple-diskimage

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Check Nora bridge usage
        run: npm run check:nora-bridge-usage

      - name: Run unit tests
        run: npm run test:unit

      - name: Verify macOS signing secrets
        if: runner.os == 'macOS'
        shell: bash
        env:
          NORA_MAC_CERTIFICATE_P12_BASE64: ${{ secrets.NORA_MAC_CERTIFICATE_P12_BASE64 }}
          NORA_MAC_CERTIFICATE_PASSWORD: ${{ secrets.NORA_MAC_CERTIFICATE_PASSWORD }}
          NORA_MAC_CODESIGN_IDENTITY: ${{ secrets.NORA_MAC_CODESIGN_IDENTITY }}
          NORA_APPLE_ID: ${{ secrets.NORA_APPLE_ID }}
          NORA_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.NORA_APPLE_APP_SPECIFIC_PASSWORD }}
          NORA_APPLE_TEAM_ID: ${{ secrets.NORA_APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in \
            NORA_MAC_CERTIFICATE_P12_BASE64 \
            NORA_MAC_CERTIFICATE_PASSWORD \
            NORA_MAC_CODESIGN_IDENTITY \
            NORA_APPLE_ID \
            NORA_APPLE_APP_SPECIFIC_PASSWORD \
            NORA_APPLE_TEAM_ID
          do
            if [ -z "${!name}" ]; then
              echo "Missing required macOS release secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          NORA_MAC_CERTIFICATE_P12_BASE64: ${{ secrets.NORA_MAC_CERTIFICATE_P12_BASE64 }}
          NORA_MAC_CERTIFICATE_PASSWORD: ${{ secrets.NORA_MAC_CERTIFICATE_PASSWORD }}
          NORA_MAC_CODESIGN_IDENTITY: ${{ secrets.NORA_MAC_CODESIGN_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          CERTIFICATE_PATH="${RUNNER_TEMP}/nora-developer-id.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/nora-release.keychain-db"

          printf '%s' "${NORA_MAC_CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERTIFICATE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" \
            -P "${NORA_MAC_CERTIFICATE_PASSWORD}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | grep -F "${NORA_MAC_CODESIGN_IDENTITY}"

      - name: Make distributables
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          NORA_GITHUB_CLIENT_ID: ${{ secrets.NORA_GITHUB_CLIENT_ID }}
          NORA_MAC_CODESIGN_IDENTITY: ${{ secrets.NORA_MAC_CODESIGN_IDENTITY }}
          NORA_MAC_DMG_CODESIGN_IDENTITY: ${{ secrets.NORA_MAC_CODESIGN_IDENTITY }}
          NORA_MAC_UPDATE_MANIFEST_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
          NORA_MAC_UPDATE_RELEASE_NOTES: ${{ github.ref_name }}
          NORA_NOTARIZE: ${{ runner.os == 'macOS' && '1' || '' }}
          NORA_NOTARY_APPLE_ID: ${{ secrets.NORA_APPLE_ID }}
          NORA_NOTARY_APPLE_ID_PASSWORD: ${{ secrets.NORA_APPLE_APP_SPECIFIC_PASSWORD }}
          NORA_NOTARY_TEAM_ID: ${{ secrets.NORA_APPLE_TEAM_ID }}
          NORA_POSTHOG_API_KEY: ${{ secrets.NORA_POSTHOG_API_KEY }}
          NORA_POSTHOG_HOST: ${{ secrets.NORA_POSTHOG_HOST }}
          VITE_PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_PUBLIC_POSTHOG_PROJECT_TOKEN }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
        run: ${{ matrix.make_command }}

      - name: Notarize and staple macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        env:
          NORA_APPLE_ID: ${{ secrets.NORA_APPLE_ID }}
          NORA_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.NORA_APPLE_APP_SPECIFIC_PASSWORD }}
          NORA_APPLE_TEAM_ID: ${{ secrets.NORA_APPLE_TEAM_ID }}
        run: |
          DMG_PATH="out/make/Nora-arm64.dmg"
          if [ ! -f "${DMG_PATH}" ]; then
            echo "Missing expected macOS DMG at ${DMG_PATH}"
            exit 1
          fi
          xcrun notarytool submit "${DMG_PATH}" \
            --apple-id "${NORA_APPLE_ID}" \
            --password "${NORA_APPLE_APP_SPECIFIC_PASSWORD}" \
            --team-id "${NORA_APPLE_TEAM_ID}" \
            --wait
          xcrun stapler staple "${DMG_PATH}"
          xcrun stapler validate "${DMG_PATH}"

      - name: Verify macOS release artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          DMG_PATH="out/make/Nora-arm64.dmg"
          CHECKSUM_PATH="out/make/Nora-arm64.dmg.sha256"
          ZIP_DIR="out/make/zip/darwin/arm64"
          RELEASES_JSON_PATH="${ZIP_DIR}/RELEASES.json"
          ZIP_PATH="$(find "${ZIP_DIR}" -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          if [ ! -f "${DMG_PATH}" ]; then
            echo "Missing expected macOS DMG at ${DMG_PATH}"
            exit 1
          fi
          if [ ! -f "${RELEASES_JSON_PATH}" ]; then
            echo "Missing expected macOS updater manifest at ${RELEASES_JSON_PATH}"
            exit 1
          fi
          if [ -z "${ZIP_PATH}" ]; then
            echo "Missing expected macOS updater zip in ${ZIP_DIR}"
            exit 1
          fi
          hdiutil verify "${DMG_PATH}"
          codesign --verify --verbose=2 "${DMG_PATH}"
          xcrun stapler validate "${DMG_PATH}"
          spctl -a -vv -t install "${DMG_PATH}"

          APP_VERIFY_DIR="$(mktemp -d "${TMPDIR:-/tmp}/nora-updater-app.XXXXXX")"
          ditto -x -k "${ZIP_PATH}" "${APP_VERIFY_DIR}"
          if [ ! -d "${APP_VERIFY_DIR}/Nora.app" ]; then
            echo "Missing Nora.app inside macOS updater zip at ${ZIP_PATH}"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${APP_VERIFY_DIR}/Nora.app"
          spctl -a -vv --type execute "${APP_VERIFY_DIR}/Nora.app"
          (
            cd out/make
            shasum -a 256 Nora-arm64.dmg > Nora-arm64.dmg.sha256
          )
          if [ ! -s "${CHECKSUM_PATH}" ]; then
            echo "Failed to generate checksum file at ${CHECKSUM_PATH}"
            exit 1
          fi

      - name: Upload make artifacts to Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: ${{ matrix.storage_path }}
          SOURCE_DIR: ${{ matrix.source_dir }}
          SUPABASE_UPLOAD_CONTENT_TYPE: ${{ matrix.upload_content_type }}
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ARCHIVE_PATH="${SOURCE_DIR}/Nora-arm64.dmg"
            if [ ! -f "${ARCHIVE_PATH}" ]; then
              echo "Missing expected macOS DMG at ${ARCHIVE_PATH}"
              exit 1
            fi
            export ARCHIVE_PATH
          else
            ARCHIVE_PATH="$(mktemp "${TMPDIR:-/tmp}/${{ matrix.storage_name }}.XXXXXX.tgz")"
            export ARCHIVE_PATH
            tar -C "${SOURCE_DIR}" -czf "${ARCHIVE_PATH}" .
          fi
          node scripts/release/upload-supabase-artifact.mjs

      - name: Verify macOS DMG round-trip against Supabase
        if: runner.os == 'macOS'
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
        run: |
          DOWNLOAD_URL="${SUPABASE_STORAGE_URL%/}/storage/v1/object/authenticated/${SUPABASE_BUCKET}/releases/${{ github.ref_name }}/macos-arm64.dmg"
          DL="$(mktemp "${TMPDIR:-/tmp}/nora-dmg-roundtrip.XXXXXX")"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --output "${DL}" \
            "${DOWNLOAD_URL}"
          EXPECTED="$(awk '{print $1}' out/make/Nora-arm64.dmg.sha256)"
          ACTUAL="$(shasum -a 256 "${DL}" | awk '{print $1}')"
          rm -f "${DL}"
          if [ "${EXPECTED}" != "${ACTUAL}" ]; then
            echo "Round-trip SHA-256 mismatch (upload may be truncated): expected ${EXPECTED}, got ${ACTUAL}" >&2
            exit 1
          fi

      - name: Upload macOS DMG checksum to Supabase
        if: runner.os == 'macOS'
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/macos-arm64.dmg.sha256
          SUPABASE_UPLOAD_CONTENT_TYPE: text/plain
          ARCHIVE_PATH: out/make/Nora-arm64.dmg.sha256
        run: node scripts/release/upload-supabase-artifact.mjs

      - name: Upload macOS updater artifacts to Supabase
        if: runner.os == 'macOS'
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/macos-updater.tgz
          SUPABASE_UPLOAD_CONTENT_TYPE: application/gzip
        run: |
          ZIP_DIR="out/make/zip/darwin/arm64"
          ARCHIVE_PATH="$(mktemp "${TMPDIR:-/tmp}/nora-macos-updater.XXXXXX.tgz")"
          tar -C "${ZIP_DIR}" -czf "${ARCHIVE_PATH}" .
          export ARCHIVE_PATH
          node scripts/release/upload-supabase-artifact.mjs
          rm -f "${ARCHIVE_PATH}"

  release:
    name: Create GitHub release (Windows, Linux, macOS)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Windows build artifact from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/windows.tgz
          DEST_DIR: release-assets
        run: bash scripts/release/download-supabase-artifact.sh

      - name: Download Linux build artifact from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/linux-deb.tgz
          DEST_DIR: release-assets
        run: bash scripts/release/download-supabase-artifact.sh

      - name: Download macOS DMG from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
        run: |
          mkdir -p release-assets
          DOWNLOAD_URL="${SUPABASE_STORAGE_URL%/}/storage/v1/object/authenticated/${SUPABASE_BUCKET}/releases/${{ github.ref_name }}/macos-arm64.dmg"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --output "release-assets/Nora-arm64.dmg" \
            "${DOWNLOAD_URL}"

      - name: Download macOS DMG checksum from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
        run: |
          DOWNLOAD_URL="${SUPABASE_STORAGE_URL%/}/storage/v1/object/authenticated/${SUPABASE_BUCKET}/releases/${{ github.ref_name }}/macos-arm64.dmg.sha256"
          curl \
            --fail \
            --silent \
            --show-error \
            --location \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --output "release-assets/Nora-arm64.dmg.sha256" \
            "${DOWNLOAD_URL}"

      - name: Download macOS updater artifacts from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/macos-updater.tgz
          DEST_DIR: release-assets
        run: bash scripts/release/download-supabase-artifact.sh

      - name: Verify macOS DMG checksum
        shell: bash
        run: |
          cd release-assets
          shasum -a 256 -c Nora-arm64.dmg.sha256
          rm -f Nora-arm64.dmg.sha256

      - name: Verify macOS updater assets
        shell: bash
        run: |
          if [ ! -f "release-assets/RELEASES.json" ]; then
            echo "Missing macOS updater manifest in release-assets"
            exit 1
          fi
          if [ -z "$(find release-assets -maxdepth 1 -type f -name '*.zip' -print -quit)" ]; then
            echo "Missing macOS updater zip in release-assets"
            exit 1
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true

  publish_apt:
    name: Publish APT repository
    runs-on: ubuntu-latest
    needs:
      - build
      - release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download Linux build artifact from Supabase
        shell: bash
        env:
          SUPABASE_STORAGE_URL: ${{ secrets.NORA_SUPABASE_STORAGE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NORA_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.NORA_SUPABASE_BUCKET }}
          SUPABASE_STORAGE_PATH: releases/${{ github.ref_name }}/linux-deb.tgz
          DEST_DIR: release-assets
        run: bash scripts/release/download-supabase-artifact.sh

      - name: Install publishing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg

      - name: Clone APT repository
        env:
          NORA_APT_REPO_TOKEN: ${{ secrets.NORA_APT_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${NORA_APT_REPO_TOKEN}@github.com/Citosoft/apt.git" apt-repo

      - name: Update signed APT repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
          APT_RELEASE_REPO: Citosoft/nora
          APT_RELEASE_TAG: ${{ github.ref_name }}
        run: |
          DEB_PATH="$(find release-assets -type f -name '*.deb' | head -n 1)"
          if [ -z "${DEB_PATH}" ]; then
            echo "No .deb artifact found in release-assets"
            exit 1
          fi
          cd apt-repo
          bash scripts/update-apt-repo.sh "${GITHUB_WORKSPACE}/${DEB_PATH}"

      - name: Commit and push APT repository updates
        env:
          NORA_APT_REPO_TOKEN: ${{ secrets.NORA_APT_REPO_TOKEN }}
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No APT repository changes to commit."
            exit 0
          fi
          git commit -m "Publish ${GITHUB_REF_NAME}"
          git push "https://x-access-token:${NORA_APT_REPO_TOKEN}@github.com/Citosoft/apt.git" HEAD:main
